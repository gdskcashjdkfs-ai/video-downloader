<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
        .tiktok-logo-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .tiktok-icon { width: 50px; height: 50px; filter: drop-shadow(0 0 10px #9333ea); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <main class="w-full max-w-md bg-gray-900 p-6 rounded-2xl shadow-2xl border border-gray-800 text-center">
        <h1 class="text-2xl font-bold mb-4 text-purple-400">TikTok Downloader</h1>
        <div class="tiktok-logo-container"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046124.png" alt="TikTok" class="tiktok-icon"></div>
        <div class="space-y-4">
            <input type="url" id="videoUrl" placeholder="Paste link here..." class="w-full p-4 bg-gray-850 border border-gray-700 rounded-xl text-white text-center">
            <button onclick="handleDownload()" id="btnDownload" class="w-full p-4 bg-purple-600 hover:bg-purple-700 font-bold rounded-xl cursor-pointer">Download Now ⚡</button>
        </div>
        <div id="resultArea" class="hidden mt-6 p-4 bg-gray-800 rounded-xl">
            <a id="btnDownloadLink" href="#" onclick="openAdAndDownload(event)" class="block w-full p-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg cursor-pointer">Download Video 🎉</a>
        </div>
    </main>

    <script>
        const smartlink3 = "https://www.highratecpm.com/ew6p969sc?key=8e68cc6274495ca2b99df38e9da16d00"; 
        const smartlink2 = "https://www.highratecpm.com/ew6p969sc?key=b654cc3c509b5528fae9296625046d00"; 
        
        let actualDownloadUrl = "#";

        async function handleDownload() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btnDownload');
            const resultArea = document.getElementById('resultArea');
            if(!url) return alert("Please paste a link!");

            btn.innerText = "Extracting... ⏳";
            try {
                const response = await fetch('/api/download', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ videoUrl: url }) });
                const data = await response.json();
                if(data.success) {
                    actualDownloadUrl = data.downloadUrl;
                    resultArea.classList.remove('hidden');
                } else { alert("Error: " + data.error); }
            } catch (err) { alert("Connection error."); }
            btn.innerText = "Download Now ⚡";
        }

        function openAdAndDownload(event) {
            event.preventDefault();
            
            window.open(smartlink3, '_blank');
            window.open(smartlink2, '_blank');
            window.location.href = actualDownloadUrl;
        }
    </script>
</body>
    </html>
