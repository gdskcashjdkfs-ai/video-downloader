<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKDOWN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">

    <!-- الشعار في الأعلى بدون قائمة -->
    <div class="flex items-center gap-3 mb-12 self-start">
        <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center font-bold">↓</div>
        <div>
            <h1 class="font-bold text-lg">TIKDOWN</h1>
            <p class="text-xs text-gray-400">Video Downloader (no watermark)</p>
        </div>
    </div>

    <!-- العنوان الرئيسي -->
    <h2 class="text-3xl font-black text-center mb-10 leading-tight">DOWNLOAD TIKTOK VIDEOS<br>NO WATERMARK</h2>

    <!-- مربع الإدخال -->
    <div class="w-full max-w-md bg-[#1a1a1a] p-6 rounded-3xl border border-gray-800 mb-10">
        <input type="url" placeholder="Paste your TikTok link here..." 
            class="w-full bg-transparent border-b border-gray-700 pb-2 mb-6 outline-none text-white">
        <button class="w-full bg-purple-600 py-4 rounded-xl font-bold">DOWNLOAD</button>
    </div>

    <!-- خطوات العمل (كما في 1000007366.png) -->
    <div class="grid grid-cols-3 gap-2 text-center text-xs mb-10 w-full max-w-md">
        <div>1. COPY<br>LINK</div>
        <div>></div>
        <div>2. PASTE<br>LINK</div>
        <div>></div>
        <div>3.<br>DOWNLOAD</div>
    </div>

    <!-- الأيقونات السفلية -->
    <div class="grid grid-cols-2 gap-3 w-full max-w-md">
        <div class="border border-gray-700 p-4 rounded-xl text-center text-sm">HIGH QUALITY</div>
        <div class="border border-gray-700 p-4 rounded-xl text-center text-sm">ULTRA-FAST</div>
        <div class="border border-gray-700 p-4 rounded-xl text-center text-sm">NO ADS</div>
        <div class="border border-gray-700 p-4 rounded-xl text-center text-sm">TOTALLY SECURE</div>
    </div>

</body>
</html>
