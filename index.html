<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
        .tiktok-logo-container { display: flex; justify-content: center; margin-bottom: 20px; margin-top: 10px; }
        .tiktok-icon { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 0 10px #9333ea); transition: transform 0.3s ease; }
        .tiktok-icon:hover { transform: scale(1.15); }
        .site-footer { background: linear-gradient(180deg, rgba(11, 15, 25, 0) 0%, rgba(147, 51, 234, 0.08) 100%); border-top: 1px solid rgba(147, 51, 234, 0.15); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-between p-4">

    <!-- TOP BANNER AD SLOT -->
    <div class="w-full max-w-4xl flex justify-center my-2">
        <div id="top-ad-slot" class="w-full text-center">
            <!-- Insert your Adsterra Banner code here -->
        </div>
    </div>

    <main class="w-full max-w-md bg-gray-900 p-6 rounded-2xl shadow-2xl border border-gray-800 text-center my-auto">
        <h1 class="text-2xl font-bold mb-2 text-purple-400">TikTok Downloader</h1>
        <p class="text-sm text-gray-400 mb-4">Download TikTok videos watermark-free instantly.</p>

        <div class="tiktok-logo-container">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046124.png" alt="TikTok" class="tiktok-icon">
        </div>

        <div class="space-y-4">
            <input type="url" id="videoUrl" placeholder="Paste TikTok video link here..." 
                class="w-full p-4 bg-gray-850 border border-gray-700 rounded-xl text-white text-center focus:outline-none focus:border-purple-500 transition-all">
            
            <button id="btnDownload"
                class="w-full p-4 bg-purple-600 hover:bg-purple-700 font-bold rounded-xl shadow-lg shadow-purple-900/40 transition-all cursor-pointer">
                Download Now ⚡
            </button>
        </div>

        <div id="resultArea" class="hidden mt-6 p-4 bg-gray-800 rounded-xl border border-gray-700">
            <a id="btnDownloadLink" href="#" target="_blank" rel="noopener noreferrer"
                class="block w-full p-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg transition-all cursor-pointer">
                Download Video 🎉
            </a>
        </div>
    </main>

    <footer class="site-footer w-full py-6 px-4 text-center mt-auto">
        <p class="text-[10px] text-gray-600">© 2026 TikTok Watermark Remover Pro. All Rights Reserved.</p>
    </footer>

    <!-- BOTTOM BANNER AD SLOT -->
    <div class="w-full max-w-4xl flex justify-center my-2">
        <div id="bottom-ad-slot" class="w-full text-center">
            <!-- Insert your Adsterra Banner code here -->
        </div>
    </div>

    <script>
        // Add your download logic here
    </script>
</body>
</html>
