<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="jn6IMwGJmsEjPQU_f0_h6hb8KtDrTmfbQKvHG6CXHKE" />
    <title>TikTok Video Downloader Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
        .tiktok-logo-container { display: flex; justify-content: center; margin-bottom: 20px; margin-top: 10px; }
        .tiktok-icon { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 0 10px #9333ea); transition: transform 0.3s ease; }
        .tiktok-icon:hover { transform: scale(1.15); }
        .site-footer { background: linear-gradient(180deg, rgba(11, 15, 25, 0) 0%, rgba(147, 51, 234, 0.08) 100%); border-top: 1px solid rgba(147, 51, 234, 0.15); }
        .stat-badge { background: rgba(147, 51, 234, 0.1); border: 1px solid #9333ea; box-shadow: 0 0 15px rgba(147, 51, 234, 0.2); }
        .rtl { direction: rtl; font-family: system-ui, -apple-system, sans-serif; }
        /* حماية إضافية للنقرات */
        .click-shield { position: relative; z-index: 10; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-between p-4">

    <header class="w-full max-w-4xl flex justify-end gap-2 my-2 px-2">
        <button onclick="switchLanguage('en')" id="lang-en" class="text-xs px-3 py-1.5 rounded-lg bg-purple-600 text-white font-semibold shadow-md transition-all cursor-pointer">EN</button>
        <button onclick="switchLanguage('ar')" id="lang-ar" class="text-xs px-3 py-1.5 rounded-lg bg-gray-800 text-gray-400 font-semibold hover:bg-gray-750 transition-all cursor-pointer">AR</button>
    </header>

    <div class="w-full max-w-4xl flex justify-center my-2">
        <div id="top-ad-slot" style="width: 320px; height: 50px; overflow: hidden; display: block; margin: 0 auto;">
            <script>
              atOptions = { 'key' : '245934cca18e577e4289c1bbee57ba84', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script src="https://www.highperformanceformat.com/245934cca18e577e4289c1bbee57ba84/invoke.js"></script>
        </div>
    </div>

    <main class="w-full max-w-md bg-gray-900 p-6 rounded-2xl shadow-2xl border border-gray-800 text-center my-auto">
        <h1 id="main-title" class="text-2xl font-bold mb-2 text-purple-400">TikTok Downloader</h1>
        <p id="main-desc" class="text-sm text-gray-400 mb-4">Download TikTok videos watermark-free instantly.</p>

        <div class="tiktok-logo-container">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046124.png" alt="TikTok" class="tiktok-icon">
        </div>

        <div class="space-y-4">
            <input type="url" id="videoUrl" placeholder="Paste TikTok video link here..." 
                class="w-full p-4 bg-gray-850 border border-gray-700 rounded-xl text-white text-center focus:outline-none focus:border-purple-500 transition-all">
            
            <button onclick="handleDownload(event)" id="btnDownload"
                class="w-full p-4 bg-purple-600 hover:bg-purple-700 font-bold rounded-xl shadow-lg shadow-purple-900/40 transition-all cursor-pointer click-shield">
                Download Now ⚡
            </button>
        </div>

        <div id="resultArea" class="hidden mt-6 p-4 bg-gray-800 rounded-xl border border-gray-700">
            <p id="videoTitle" class="text-sm font-semibold truncate mb-3 text-gray-200"></p>
            <a id="btnDownloadLink" href="#" target="_blank" rel="noopener noreferrer"
                onclick="event.stopPropagation();"
                class="block w-full p-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg transition-all cursor-pointer click-shield">
                Download Video 🎉
            </a>
        </div>
    </main>

    <footer class="site-footer w-full py-6 px-4 text-center mt-auto">
        <!-- Footer Content -->
        <div class="max-w-2xl mx-auto flex flex-col items-center gap-4">
            <div class="stat-badge px-5 py-1.5 rounded-full inline-flex items-center gap-2">
                <span class="text-white font-bold text-sm">50,000+</span>
                <span id="stat-text" class="text-gray-400 text-xs">Monthly Active Users</span>
            </div>
            <p id="footer-established" class="text-xs text-gray-300 font-semibold">Established in 2026</p>
        </div>
    </footer>

    <script>
        // دالة الحماية لمنع إعادة التوجيه الخارجي
        function handleDownload(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btnDownload');
            const resultArea = document.getElementById('resultArea');
            if(!url) return alert(translations[currentLang].alertEmpty);
            
            btn.innerText = translations[currentLang].btnExtracting;
            btn.disabled = true;
            
            fetch('/api/download', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ videoUrl: url }) 
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('btnDownloadLink').href = data.downloadUrl;
                    resultArea.classList.remove('hidden');
                } else {
                    alert(translations[currentLang].alertError + data.error);
                }
            })
            .catch(() => alert(translations[currentLang].alertConnection))
            .finally(() => {
                btn.innerText = translations[currentLang].btnDownload;
                btn.disabled = false;
            });
        }

        // الكود المترجم (باقي الوظائف كما هي)
        const translations = {
            en: { alertEmpty: "Please paste a valid link first!", alertError: "Error: ", alertConnection: "Connection error.", btnDownload: "Download Now ⚡", btnExtracting: "Extracting... ⏳" },
            ar: { alertEmpty: "يرجى لصق رابط صالح!", alertError: "خطأ: ", alertConnection: "خطأ في الاتصال.", btnDownload: "التحميل الآن ⚡", btnExtracting: "جاري الاستخراج... ⏳" }
        };
        let currentLang = 'en';
        function switchLanguage(lang) {
            currentLang = lang;
            // يمكنك إضافة باقي تحديثات النصوص هنا
        }
    </script>
</body>
    </html>
